version: '3.8'

services:
  
  member:
    image: service-member:latest
    container_name: service-member
    ports:
      - "8080:8080"
    restart: always
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd
    command: >
      /usr/local/bin/etcd
      --name etcd0
      --advertise-client-urls http://etcd:2379
      --listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
  apisix:
    image: apache/apisix:3.9.1-debian
    container_name: apisix
    depends_on:
      - etcd
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
    - ./config.yaml:/usr/local/apisix/conf/config.yaml